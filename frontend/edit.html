<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clocktower Editor Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121214;
      --panel: #191c22;
      --panel-2: #22262f;
      --panel-3: #2c3240;
      --border: rgba(255,255,255,0.08);
      --text: #f5f7fb;
      --muted: #9da7b5;
      --accent: #7c5cff;
      --accent-2: #5eead4;
      --warning: #f59e0b;
      --success: #22c55e;
      --danger: #fb7185;
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,92,255,0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(94,234,212,0.08), transparent 28%),
        var(--bg);
      color: var(--text);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: rgba(18,18,20,0.84);
      border-bottom: 1px solid var(--border);
      padding: 14px 22px;
    }

    .topbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .brand {
      display: grid;
      gap: 4px;
    }

    .brand small {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent-2);
      font-weight: 700;
      font-size: 11px;
    }

    .brand strong { font-size: 1.1rem; }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar-group {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar input {
      min-width: 220px;
      height: 46px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 0 14px;
      font-size: 0.95rem;
    }

    .toolbar button {
      height: 46px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #9588ff);
      color: white;
      padding: 0 18px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .toolbar button:hover:not(:disabled) { transform: translateY(-1px); }
    .toolbar button:disabled { opacity: 0.55; cursor: not-allowed; }

    .toolbar button.secondary,
    .card-actions button.secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 22px 64px;
      display: grid;
      gap: 24px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(280px, 3fr) minmax(260px, 2fr);
      gap: 24px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .banner-panel {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .banner-wrap {
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      min-height: 180px;
      background: linear-gradient(135deg, rgba(124,92,255,0.18), rgba(94,234,212,0.08));
      display: grid;
      place-items: center;
    }

    .banner-wrap img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    .script-heading {
      display: grid;
      gap: 6px;
      padding: 0 6px 6px;
    }

    .script-heading h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
    }

    .script-heading p,
    .meta-list p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .meta-panel {
      padding: 22px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .meta-list {
      display: grid;
      gap: 12px;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.92rem;
      width: fit-content;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 18px;
    }

    .card {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .card-topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .card-head {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .thumb {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      flex: 0 0 auto;
      display: grid;
      place-items: center;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-title {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .card-title h2 {
      margin: 0;
      font-size: 1.05rem;
      overflow-wrap: anywhere;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
    }

    .badge.standard { color: var(--accent-2); }
    .badge.custom { color: var(--warning); }

    .badge.deleted {
      color: var(--danger);
    }

    .field-grid {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      resize: vertical;
    }

    .field textarea { min-height: 110px; }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card-actions button {
      min-height: 42px;
      border: 0;
      border-radius: 14px;
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .card-actions button.danger {
      background: rgba(251,113,133,0.14);
      color: #ffd8df;
      border-color: rgba(251,113,133,0.35);
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .topbar { padding-inline: 14px; }
      .page { padding-inline: 14px; }
      .toolbar { width: 100%; }
      .toolbar input,
      .toolbar button { width: 100%; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <small>Interactive editor</small>
        <strong id="brandTitle">Clocktower Script Dashboard</strong>
      </div>
      <div class="toolbar">
        <div class="toolbar-group">
          <button id="addOfficialButton" type="button" class="secondary">Add Official Role</button>
          <button id="addHomebrewButton" type="button" class="secondary">Add Homebrew Role</button>
          <button id="arrangeFirstNightButton" type="button" class="secondary">Arrange First Night</button>
          <button id="arrangeOtherNightButton" type="button" class="secondary">Arrange Other Nights</button>
        </div>
        <div class="toolbar-group">
          <input id="editorInput" type="text" maxlength="80" placeholder="Editor nickname">
          <button id="saveButton" type="button">Save Changes</button>
        </div>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <article class="panel banner-panel">
        <div class="banner-wrap">
          <img id="bannerImage" alt="Script banner" loading="eager">
        </div>
        <div class="script-heading">
          <h1 id="scriptTitle">Loading script…</h1>
          <p id="scriptSubtitle">Fetching the stored script composition.</p>
        </div>
      </article>

      <aside class="panel meta-panel">
        <div class="meta-list">
          <div class="meta-chip">Script ID: <strong id="scriptIdLabel">—</strong></div>
          <div class="meta-chip">Entries: <strong id="entryCountLabel">0</strong></div>
          <a id="jsonLink" class="meta-chip" href="#" target="_blank" rel="noopener">Open script JSON</a>
        </div>
        <p>Every imported token can now be added, removed, or edited before saving back to disk with an audit history entry.</p>
        <div class="status" id="statusLine"></div>
      </aside>
    </section>

    <section id="cards" class="cards"></section>
  </main>

  <script>
    const TEAM_OPTIONS = ['townsfolk', 'outsider', 'minion', 'demon'];
    const params = new URLSearchParams(window.location.search);
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const pathScriptId = pathParts.length >= 2 && pathParts[0] === 'script' ? pathParts[1] : null;
    const scriptId = params.get('id') || pathScriptId;

    const brandTitle = document.getElementById('brandTitle');
    const scriptTitle = document.getElementById('scriptTitle');
    const scriptSubtitle = document.getElementById('scriptSubtitle');
    const scriptIdLabel = document.getElementById('scriptIdLabel');
    const entryCountLabel = document.getElementById('entryCountLabel');
    const bannerImage = document.getElementById('bannerImage');
    const cards = document.getElementById('cards');
    const saveButton = document.getElementById('saveButton');
    const addOfficialButton = document.getElementById('addOfficialButton');
    const addHomebrewButton = document.getElementById('addHomebrewButton');
    const arrangeFirstNightButton = document.getElementById('arrangeFirstNightButton');
    const arrangeOtherNightButton = document.getElementById('arrangeOtherNightButton');
    const editorInput = document.getElementById('editorInput');
    const statusLine = document.getElementById('statusLine');
    const jsonLink = document.getElementById('jsonLink');

    let scriptData = [];
    let officialRoles = [];
    let officialRoleMap = new Map();

    function setStatus(message = '', tone = '') {
      statusLine.textContent = message;
      statusLine.className = `status${tone ? ` ${tone}` : ''}`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function roleIsStandard(role) {
      return role?._kind === 'official';
    }

    function bannerFallback() {
      bannerImage.alt = 'Script banner unavailable';
      bannerImage.style.display = 'none';
      bannerImage.parentElement.innerHTML = '<div style="padding:32px;text-align:center;color:#9da7b5;">Banner unavailable</div>';
    }

    function slugifyId(value) {
      return String(value ?? '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 50);
    }

    function nextHomebrewId(usedIds = new Set()) {
      let index = 1;
      while (usedIds.has(`homebrew-${index}`)) {
        index += 1;
      }
      return `homebrew-${index}`;
    }

    function parseNightOrderValue(value) {
      const raw = String(value ?? '').trim();
      if (!raw) {
        return null;
      }
      const parsed = Number.parseInt(raw, 10);
      if (!Number.isFinite(parsed) || parsed < 0) {
        return null;
      }
      return parsed;
    }

    function normalizeEntry(entry) {
      if (entry && typeof entry === 'object' && entry.id === '_meta') {
        return { ...entry };
      }

      if (typeof entry === 'string') {
        const role = officialRoleMap.get(entry);
        return {
          _kind: 'official',
          id: entry,
          name: role?.name || entry,
          team: role?.team || '',
          ability: role?.ability || '',
        };
      }

      if (entry && typeof entry === 'object') {
        const roleId = String(entry.id || '').trim();
        const looksOfficial = roleId
          && !entry.name
          && !entry.ability
          && !entry.team
          && !entry.image
          && !Object.prototype.hasOwnProperty.call(entry, 'firstNight')
          && !Object.prototype.hasOwnProperty.call(entry, 'otherNight');
        if (looksOfficial) {
          const role = officialRoleMap.get(roleId);
          return {
            _kind: 'official',
            id: roleId,
            name: role?.name || roleId,
            team: role?.team || '',
            ability: role?.ability || '',
          };
        }
        return {
          _kind: 'custom',
          id: roleId || nextHomebrewId(new Set(scriptData.map((item) => item?.id).filter(Boolean))),
          name: String(entry.name || '').trim(),
          ability: String(entry.ability || '').trim(),
          team: String(entry.team || 'townsfolk').trim() || 'townsfolk',
          image: String(entry.image || '').trim(),
          firstNight: parseNightOrderValue(entry.firstNight),
          otherNight: parseNightOrderValue(entry.otherNight),
        };
      }

      return {
        _kind: 'custom',
        id: nextHomebrewId(new Set(scriptData.map((item) => item?.id).filter(Boolean))),
        name: '',
        ability: '',
        team: 'townsfolk',
        image: '',
        firstNight: null,
        otherNight: null,
      };
    }

    function syncEntriesFromDom() {
      const usedIds = new Set();
      scriptData = scriptData.map((entry, index) => {
        if (entry && typeof entry === 'object' && entry.id === '_meta') {
          return entry;
        }

        const card = cards.querySelector(`[data-index="${index}"]`);
        if (!card) {
          return entry;
        }

        const kind = card.querySelector('[data-field="kind"]').value;
        if (kind === 'official') {
          const roleId = card.querySelector('[data-field="official-id"]').value;
          const role = officialRoleMap.get(roleId);
          if (roleId) {
            usedIds.add(roleId);
          }
          return {
            _kind: 'official',
            id: roleId,
            name: role?.name || roleId,
            team: role?.team || '',
            ability: role?.ability || '',
          };
        }

        let roleId = slugifyId(card.querySelector('[data-field="id"]').value.trim());
        if (!roleId || usedIds.has(roleId)) {
          roleId = nextHomebrewId(usedIds);
        }
        usedIds.add(roleId);
        return {
          _kind: 'custom',
          id: roleId,
          name: card.querySelector('[data-field="name"]').value.trim(),
          ability: card.querySelector('[data-field="ability"]').value.trim(),
          team: card.querySelector('[data-field="team"]').value,
          image: entry?.image || '',
          firstNight: parseNightOrderValue(card.querySelector('[data-field="first-night"]').value),
          otherNight: parseNightOrderValue(card.querySelector('[data-field="other-night"]').value),
        };
      });
    }

    function renderCards() {
      const entries = scriptData.filter((entry) => !(entry && typeof entry === 'object' && entry.id === '_meta'));
      entryCountLabel.textContent = String(entries.length);

      if (!entries.length) {
        cards.innerHTML = '<article class="panel empty">No token entries were found in this script.</article>';
        return;
      }

      cards.innerHTML = scriptData.map((entry, index) => {
        if (entry && typeof entry === 'object' && entry.id === '_meta') {
          return '';
        }
        const standard = roleIsStandard(entry);
        const roleId = entry.id || '';
        const displayName = standard ? (entry.name || roleId) : (entry.name || roleId || 'New homebrew role');
        const thumb = standard
          ? '<div class="thumb">🜁</div>'
          : `<div class="thumb"><img src="/script/${encodeURIComponent(scriptId)}/script.${encodeURIComponent(roleId)}.png" alt="${escapeHtml(displayName)} thumbnail" onerror="this.closest('.thumb').innerHTML='🜂';"></div>`;
        const officialOptions = (officialRoles.some((role) => role.id === roleId)
          ? officialRoles
          : [{ id: roleId, name: entry.name || roleId, team: entry.team || '', ability: entry.ability || '' }, ...officialRoles]
        ).filter((role) => role.id).map((role) => (
          `<option value="${escapeHtml(role.id)}" ${role.id === roleId ? 'selected' : ''}>${escapeHtml(role.name)} (${escapeHtml(role.id)})</option>`
        )).join('');

        return `
          <article class="panel card" data-index="${index}" data-role-id="${escapeHtml(roleId)}" data-standard="${standard}">
            <div class="card-topbar">
              <div class="badge-row">
                <span class="badge ${standard ? 'standard' : 'custom'}">${standard ? 'Official Role' : 'Custom Role'}</span>
                <span class="badge">ID: ${escapeHtml(roleId || 'pending')}</span>
              </div>
              <div class="card-actions">
                <button type="button" class="danger" data-action="remove">Remove</button>
              </div>
            </div>
            <div class="card-head">
              ${thumb}
              <div class="card-title">
                <h2>${escapeHtml(displayName)}</h2>
                <div class="badge-row">
                  <span class="badge">${escapeHtml(entry.team || 'unassigned')}</span>
                  ${entry.firstNight !== null && entry.firstNight !== undefined ? `<span class="badge">First: ${escapeHtml(entry.firstNight)}</span>` : ''}
                  ${entry.otherNight !== null && entry.otherNight !== undefined ? `<span class="badge">Other: ${escapeHtml(entry.otherNight)}</span>` : ''}
                </div>
              </div>
            </div>
            <div class="field-grid">
              <div class="field">
                <label for="kind-${index}">Entry Type</label>
                <select id="kind-${index}" data-field="kind">
                  <option value="official" ${standard ? 'selected' : ''}>Official role</option>
                  <option value="custom" ${standard ? '' : 'selected'}>Custom role</option>
                </select>
              </div>
              ${standard ? `
                <div class="field">
                  <label for="official-${index}">Official Role</label>
                  <select id="official-${index}" data-field="official-id">
                    ${officialOptions}
                  </select>
                </div>
                <div class="field">
                  <label for="official-ability-${index}">Official Ability</label>
                  <textarea id="official-ability-${index}" readonly>${escapeHtml(entry.ability || '')}</textarea>
                </div>
              ` : `
                <div class="field">
                  <label for="id-${index}">Role ID</label>
                  <input id="id-${index}" data-field="id" type="text" value="${escapeHtml(roleId)}">
                </div>
                <div class="field">
                  <label for="name-${index}">Character Name</label>
                  <input id="name-${index}" data-field="name" type="text" value="${escapeHtml(entry.name || '')}">
                </div>
                <div class="field">
                  <label for="ability-${index}">Ability / Flavor Text</label>
                  <textarea id="ability-${index}" data-field="ability">${escapeHtml(entry.ability || '')}</textarea>
                </div>
                <div class="field">
                  <label for="team-${index}">Team Alignment</label>
                  <select id="team-${index}" data-field="team">
                    ${TEAM_OPTIONS.map((team) => `<option value="${team}" ${team === (entry.team || 'townsfolk') ? 'selected' : ''}>${team.charAt(0).toUpperCase() + team.slice(1)}</option>`).join('')}
                  </select>
                </div>
                <div class="field">
                  <label for="first-night-${index}">First Night Order</label>
                  <input id="first-night-${index}" data-field="first-night" type="number" min="0" step="1" value="${entry.firstNight ?? ''}">
                </div>
                <div class="field">
                  <label for="other-night-${index}">Other Nights Order</label>
                  <input id="other-night-${index}" data-field="other-night" type="number" min="0" step="1" value="${entry.otherNight ?? ''}">
                </div>
              `}
            </div>
          </article>
        `;
      }).join('');
    }

    function collectPayload() {
      return scriptData.map((entry) => {
        if (entry && typeof entry === 'object' && entry.id === '_meta') {
          return entry;
        }

        if (roleIsStandard(entry)) {
          return entry.id;
        }

        const payload = {
          id: entry.id,
          name: entry.name,
          ability: entry.ability,
          team: entry.team || 'townsfolk',
        };
        if (entry.image) {
          payload.image = entry.image;
        }
        if (entry.firstNight !== null && entry.firstNight !== undefined) {
          payload.firstNight = entry.firstNight;
        }
        if (entry.otherNight !== null && entry.otherNight !== undefined) {
          payload.otherNight = entry.otherNight;
        }
        return payload;
      });
    }

    function arrangeNightOrder(field, label) {
      syncEntriesFromDom();
      const metaEntries = scriptData.filter((entry) => entry && typeof entry === 'object' && entry.id === '_meta');
      const roleEntries = scriptData.filter((entry) => !(entry && typeof entry === 'object' && entry.id === '_meta'));
      roleEntries.sort((a, b) => {
        const aOrder = parseNightOrderValue(a?.[field]);
        const bOrder = parseNightOrderValue(b?.[field]);
        if (aOrder === null && bOrder === null) {
          return String(a?.name || a?.id || '').localeCompare(String(b?.name || b?.id || ''));
        }
        if (aOrder === null) return 1;
        if (bOrder === null) return -1;
        if (aOrder !== bOrder) return aOrder - bOrder;
        return String(a?.name || a?.id || '').localeCompare(String(b?.name || b?.id || ''));
      });
      scriptData = [...metaEntries, ...roleEntries];
      renderCards();
      setStatus(`${label} order arranged locally. Save to persist the change.`);
    }

    async function loadOfficialRoles() {
      const response = await fetch('/api/official-roles');
      const payload = await response.json().catch(() => []);
      if (!response.ok || !Array.isArray(payload)) {
        throw new Error('Unable to load official roles.');
      }
      officialRoles = payload
        .filter((role) => role && typeof role === 'object' && role.id)
        .sort((a, b) => String(a.name || a.id).localeCompare(String(b.name || b.id)));
      officialRoleMap = new Map(officialRoles.map((role) => [role.id, role]));
      addOfficialButton.disabled = officialRoles.length === 0;
    }

    async function saveChanges() {
      if (!scriptId) {
        setStatus('Missing script id.', 'error');
        return;
      }

      syncEntriesFromDom();
      saveButton.disabled = true;
      setStatus('Saving updates to disk…');

      try {
        const nickname = editorInput.value.trim() || 'anonymous';
        const response = await fetch(`/api/script/${encodeURIComponent(scriptId)}/update?edited_by=${encodeURIComponent(nickname)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(collectPayload()),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.detail || 'Save failed.');
        }
        setStatus(payload.message || 'Changes saved.', 'success');
      } catch (error) {
        setStatus(error.message || 'Save failed.', 'error');
      } finally {
        saveButton.disabled = false;
      }
    }

    async function loadScript() {
      if (!scriptId) {
        scriptTitle.textContent = 'Missing script id';
        scriptSubtitle.textContent = 'Open this page at /script/<uuid>/ or with ?id=<uuid>.';
        cards.innerHTML = '<article class="panel empty">A script id is required to load the dashboard.</article>';
        saveButton.disabled = true;
        addOfficialButton.disabled = true;
        addHomebrewButton.disabled = true;
        arrangeFirstNightButton.disabled = true;
        arrangeOtherNightButton.disabled = true;
        return;
      }

      scriptIdLabel.textContent = scriptId;
      brandTitle.textContent = `Editing ${scriptId}`;
      jsonLink.href = `/script/${encodeURIComponent(scriptId)}/script.json`;
      bannerImage.src = `/script/${encodeURIComponent(scriptId)}/scriptlogo.png`;
      bannerImage.onerror = bannerFallback;

      try {
        addOfficialButton.disabled = true;
        addHomebrewButton.disabled = true;
        let rolesWarning = '';
        try {
          await loadOfficialRoles();
        } catch (error) {
          officialRoles = [];
          officialRoleMap = new Map();
          rolesWarning = error.message || 'Official roles are unavailable.';
        }
        const response = await fetch(`/api/script/${encodeURIComponent(scriptId)}`);
        const payload = await response.json().catch(() => null);
        if (!response.ok || !Array.isArray(payload)) {
          throw new Error((payload && payload.detail) || 'Unable to load script data.');
        }

        scriptData = payload.map(normalizeEntry);
        const meta = scriptData.find((entry) => entry && typeof entry === 'object' && entry.id === '_meta');
        scriptTitle.textContent = meta?.name || `Script ${scriptId}`;
        scriptSubtitle.textContent = 'Loaded from server storage.';
        renderCards();
        addHomebrewButton.disabled = false;
        addOfficialButton.disabled = officialRoles.length === 0;
        arrangeFirstNightButton.disabled = false;
        arrangeOtherNightButton.disabled = false;
        setStatus(rolesWarning || 'Script loaded successfully.', rolesWarning ? 'error' : '');
      } catch (error) {
        scriptTitle.textContent = 'Unable to load script';
        scriptSubtitle.textContent = error.message || 'Unexpected error.';
        cards.innerHTML = `<article class="panel empty">${escapeHtml(error.message || 'Unable to load script.')}</article>`;
        saveButton.disabled = true;
        addOfficialButton.disabled = true;
        addHomebrewButton.disabled = true;
        arrangeFirstNightButton.disabled = true;
        arrangeOtherNightButton.disabled = true;
        setStatus(error.message || 'Unable to load script.', 'error');
      }
    }

    cards.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) {
        return;
      }
      const card = button.closest('.card');
      if (!card) {
        return;
      }
      syncEntriesFromDom();
      const index = Number(card.dataset.index);
      if (button.dataset.action === 'remove') {
        scriptData.splice(index, 1);
        renderCards();
        setStatus('Entry removed locally. Save to persist the change.');
      }
    });

    cards.addEventListener('change', (event) => {
      const field = event.target.closest('[data-field]');
      if (!field) {
        return;
      }
      if (field.dataset.field === 'kind' || field.dataset.field === 'official-id') {
        syncEntriesFromDom();
        renderCards();
        setStatus('Entry updated locally. Save to persist the change.');
      }
    });

    addOfficialButton.addEventListener('click', () => {
      syncEntriesFromDom();
      const firstRole = officialRoles[0];
      if (!firstRole) {
        setStatus('Official roles are unavailable right now.', 'error');
        return;
      }
      scriptData.push({
        _kind: 'official',
        id: firstRole.id,
        name: firstRole.name,
        team: firstRole.team,
        ability: firstRole.ability,
      });
      renderCards();
      setStatus('Official role added locally. Save to persist the change.');
    });

    addHomebrewButton.addEventListener('click', () => {
      syncEntriesFromDom();
      const usedIds = new Set(scriptData.map((entry) => entry?.id).filter(Boolean));
      scriptData.push({
        _kind: 'custom',
        id: nextHomebrewId(usedIds),
        name: '',
        ability: '',
        team: 'townsfolk',
        image: '',
        firstNight: null,
        otherNight: null,
      });
      renderCards();
      setStatus('Homebrew role added locally. Save to persist the change.');
    });

    arrangeFirstNightButton.addEventListener('click', () => arrangeNightOrder('firstNight', 'First night'));
    arrangeOtherNightButton.addEventListener('click', () => arrangeNightOrder('otherNight', 'Other night'));
    saveButton.addEventListener('click', saveChanges);
    loadScript();
  </script>
</body>
</html>
